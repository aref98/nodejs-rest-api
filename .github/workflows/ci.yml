name: CI 
on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Node.js (Intentionally Broken)
        uses: actions/setup-node@v3
        with:
          node-version: '999.x'              
          architecture: 'quantum-computer'   
          
      - name: Install dependencies
        run: npm ci
